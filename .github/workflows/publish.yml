name: Publish Website

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    name: Publish static site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare public site artifact
        run: |
          rm -rf dist
          mkdir -p dist
          find . -maxdepth 1 -name "*.html" -exec cp {} dist/ \;
          cp robots.txt dist/
          cp -R assets dist/assets
          if grep -R -n -E "wixstatic|webpackJsonp|ssrInfo|renderBodyTime" dist; then
            echo "Unexpected Wix artifact found in public site output."
            exit 1
          fi
          test -f dist/assets/site.css
          test -f dist/assets/site.js

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
